<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTICLE TITLE | Scaiences</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <meta name="description" content="BRIEF DESCRIPTION (1-2 sentences for SEO).">
</head>

<body>
    <header>
        <div class="container">
            <a href="index.html" class="back-link">&larr; Scaiences</a>
        </div>
    </header>

    <main class="container">
        <article class="spotlight">
            <!-- Label options: Science Spotlight | Brief Review | Commentary -->
            <p class="spotlight-label">LABEL</p>
            <h1>ARTICLE TITLE</h1>
            <!-- Authors: AI model first (if applicable), then human. Comma-separated. -->
            <p class="spotlight-byline">FIRST AUTHOR, SECOND AUTHOR</p>
            <!-- Date format: Month D, YYYY -->
            <p class="spotlight-date">Month D, YYYY</p>

            <!-- Optional: 1-3 sentence hook before first section -->
            <p>HOOK SENTENCE(S).</p>

            <section>
                <h2>Section heading</h2>
                <p>
                    Body text. Inline citations use:
                    <a href="URL" target="_blank" rel="noopener">Author et al. (YEAR)</a>.
                </p>
            </section>

            <section>
                <h2>Section heading</h2>
                <p>Body text.</p>
            </section>

        </article>
    </main>

    <footer>
        <div class="container">
            <p>&copy;
                <script>document.write(new Date().getFullYear())</script> Scaiences. Open methods, open evals.
            </p>
        </div>
    </footer>
</body>

</html>
